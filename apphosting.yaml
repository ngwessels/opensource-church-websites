# Firebase App Hosting configuration.
# See https://firebase.google.com/docs/app-hosting/configure
#
# Setup:
#   1. firebase apphosting:backends:create --project <PROJECT_ID>
#   2. Required secrets (create each — prompts for value):
#        firebase apphosting:secrets:set firebaseApiKey --project <PROJECT_ID>
#        firebase apphosting:secrets:set firebaseAuthDomain --project <PROJECT_ID>
#        firebase apphosting:secrets:set firebaseProjectId --project <PROJECT_ID>
#        firebase apphosting:secrets:set firebaseStorageBucket --project <PROJECT_ID>
#        firebase apphosting:secrets:set firebaseMessagingSenderId --project <PROJECT_ID>
#        firebase apphosting:secrets:set firebaseAppId --project <PROJECT_ID>
#        firebase apphosting:secrets:set siteUrl --project <PROJECT_ID>
#        firebase apphosting:secrets:set appUrl --project <PROJECT_ID>
#        firebase apphosting:secrets:set stripeSecretKey --project <PROJECT_ID>
#        firebase apphosting:secrets:set stripeWebhookSecret --project <PROJECT_ID>
#        firebase apphosting:secrets:set stripePublishableKey --project <PROJECT_ID>
#   3. Optional secrets (MCP OAuth, Mailgun) — see commented blocks below in env:.
#   4. If build says PermissionDenied, grant access:
#        firebase apphosting:secrets:grantaccess <secretName> --backend <BACKEND_ID> --project <PROJECT_ID>
#   5. Remove duplicate env vars from the Firebase Console that reference secrets you have not created.
#   6. Do not add env vars in the Console with blank values — every entry needs a value or secret
#      (e.g. delete empty NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID if you are not using Analytics).
#   7. Never store sensitive values as plaintext in the Firebase Console. Console env vars override
#      apphosting.yaml and the App Hosting preparer prints resolved values in Cloud Build logs
#      ("Final app hosting schema"). Use secret: references here + firebase apphosting:secrets:set
#      instead. Keep server-only secrets on RUNTIME availability only (not BUILD).

runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 10
  concurrency: 80

env:
  # Public URLs — set via App Hosting secrets before rollout.
  - variable: NEXT_PUBLIC_SITE_URL
    secret: siteUrl
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    secret: appUrl
    availability:
      - BUILD
      - RUNTIME

  # Firebase client config (also auto-populated as FIREBASE_WEBAPP_CONFIG at build time
  # when a Firebase web app is linked to the backend — set these if not using that flow).
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebaseApiKey
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: firebaseAuthDomain
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: firebaseProjectId
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: firebaseStorageBucket
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: firebaseMessagingSenderId
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: firebaseAppId
    availability:
      - BUILD
      - RUNTIME

  # Stripe — server secrets are runtime-only (not needed during next build).
  - variable: STRIPE_SECRET_KEY
    secret: stripeSecretKey
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: stripeWebhookSecret
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: stripePublishableKey
    availability:
      - BUILD
      - RUNTIME

  # reCAPTCHA v3 — server secret is runtime-only.
  - variable: RECAPTCHA_SECRET_KEY
    secret: recaptchaSecretKey
    availability:
      - RUNTIME

  # MCP OAuth (optional — Cursor MCP login). Uncomment after creating the secret:
  #   openssl rand -base64 32
  #   firebase apphosting:secrets:set mcpOauthCookieSecret --project <PROJECT_ID>
  #   firebase apphosting:secrets:grantaccess mcpOauthCookieSecret --backend <BACKEND_ID> --project <PROJECT_ID>
  # Also remove any duplicate MCP_OAUTH_COOKIE_SECRET from the Firebase Console backend env.
  # - variable: MCP_OAUTH_COOKIE_SECRET
  #   secret: mcpOauthCookieSecret
  #   availability:
  #     - RUNTIME
  # - variable: MCP_OAUTH_ACCESS_TOKEN_TTL_SECONDS
  #   value: "3600"
  #   availability:
  #     - RUNTIME
  # - variable: MCP_OAUTH_CODE_TTL_SECONDS
  #   value: "600"
  #   availability:
  #     - RUNTIME

  # Mailgun (optional — form notification emails). Uncomment after creating secrets:
  #   firebase apphosting:secrets:set mailgunApiKey --project <PROJECT_ID>
  #   firebase apphosting:secrets:set mailgunDomain --project <PROJECT_ID>
  #   firebase apphosting:secrets:set mailgunFrom --project <PROJECT_ID>
  #   firebase apphosting:secrets:grantaccess mailgunApiKey --backend <BACKEND_ID> --project <PROJECT_ID>
  #   (repeat grantaccess for mailgunDomain and mailgunFrom)
  # Also remove any duplicate MAILGUN_* vars from the Firebase Console backend env.
  # - variable: MAILGUN_API_KEY
  #   secret: mailgunApiKey
  #   availability:
  #     - RUNTIME
  # - variable: MAILGUN_DOMAIN
  #   secret: mailgunDomain
  #   availability:
  #     - RUNTIME
  # - variable: MAILGUN_FROM
  #   secret: mailgunFrom
  #   availability:
  #     - RUNTIME

  # Optional on App Hosting — Admin SDK uses Application Default Credentials when
  # FIREBASE_ADMIN_* is omitted. Set these secrets only if you need explicit credentials.
  # - variable: FIREBASE_ADMIN_PROJECT_ID
  #   secret: firebaseAdminProjectId
  # - variable: FIREBASE_ADMIN_CLIENT_EMAIL
  #   secret: firebaseAdminClientEmail
  # - variable: FIREBASE_ADMIN_PRIVATE_KEY
  #   secret: firebaseAdminPrivateKey
